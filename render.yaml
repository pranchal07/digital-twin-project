
services:
  - type: web
    name: digital-twin-backend
    env: python
    region: oregon
    plan: free
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn digital_twin_django_backend.wsgi:application
    pythonVersion: "3.12"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: "digital_twin_django_backend.settings"
      - key: SECRET_KEY
        value: "replace_with_your_secret_key"
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "['your_render_app_url.onrender.com']"
